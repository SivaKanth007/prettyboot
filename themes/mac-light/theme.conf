# prettyboot theme: mac-light
banner themes/mac-light/background.png
banner_scale fillscreen
icons_dir themes/mac-light/icons
selection_big themes/mac-light/selection_big.png
selection_small themes/mac-light/selection_small.png
font themes/mac-light/font.png
big_icon_size 128
small_icon_size 48
# keep OS name labels visible; hide only the key hints, scroll arrows and the
# OS "badge" overlay for a cleaner look. Boot entries are left untouched.
hideui hints,arrows,badges
